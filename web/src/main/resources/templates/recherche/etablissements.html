<!DOCTYPE html>
<html lang="fr"
      layout:decorate="~{layout/default}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Recherche</title>
</head>

<body>
<th:block layout:fragment="content">
    <!-- Bouton filtres mobile -->
    <div class="lg:hidden mb-4">
        <button @click="mobileFilters = !mobileFilters"
                class="flex items-center gap-2 rounded-full border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 4h18M7 8h10M10 12h4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span x-text="mobileFilters ? 'Masquer les filtres' : 'Filtrer les résultats'"></span>
        </button>
    </div>

    <div class="lg:flex lg:gap-8 lg:items-start">
        <div th:replace="~{recherche/facettes :: facettes}"></div>

        <section class="flex-1 min-w-0">
            <p class="text-xs text-gray-400 mb-4">Environ <span th:text="${recherche.total}"></span>
                résultats pour <span th:text="${recherche.q}"></span></p>

            <ol class="space-y-3">

                <li class="bg-white rounded-xl border border-gray-200 shadow-sm px-5 py-4 hover:border-indigo-300 transition"
                    th:each="resultat : ${recherche.resultats}">

                    <a class="text-indigo-600 text-base font-semibold hover:underline leading-snug"
                       th:href="@{/etablissements/{uai}(uai=${resultat.uai})}"
                       th:text="${resultat.nom}"></a>

                    <dl class="mt-2 flex flex-wrap gap-x-6 gap-y-1 text-sm text-gray-600">
                        <div class="flex items-center gap-1" th:if="${resultat.nomSecteur}">
                            <dt class="text-gray-400 font-medium">Secteur</dt>
                            <dd th:text="${resultat.nomSecteur}"></dd>
                        </div>
                        <div class="flex items-center gap-1" th:if="${resultat.nomNature}">
                            <dt class="text-gray-400 font-medium">Nature</dt>
                            <dd th:text="${resultat.nomNature}"></dd>
                        </div>
                        <div class="flex items-center gap-1" th:if="${resultat.nomDepartement}">
                            <dt class="text-gray-400 font-medium">Département</dt>
                            <dd th:text="${resultat.nomDepartement}">)</dd>
                        </div>
                        <div class="flex items-center gap-1" th:if="${resultat.nomAcademie}">
                            <dt class="text-gray-400 font-medium">Académie</dt>
                            <dd th:text="${resultat.nomAcademie}">Paris</dd>
                        </div>
                        <div class="flex items-center gap-1" th:if="${resultat.adresse}">
                            <dt class="text-gray-400 font-medium">Adresse</dt>
                            <dd th:text="${resultat.adresse}"></dd>
                        </div>
                        <div class="flex items-center gap-1" th:if="${resultat.nomCommune}">
                            <dt class="text-gray-400 font-medium">Commune</dt>
                            <dd th:text="${resultat.nomCommune}"></dd>
                        </div>
                        <div class="flex items-center gap-1"
                             th:if="${resultat.nomPays != null and resultat.codePays != 'FR'}">
                            <dt class="text-gray-400 font-medium">Pays</dt>
                            <dd th:text="${resultat.nomPays}"></dd>
                        </div>
                    </dl>

                    <div class="mt-3 flex flex-wrap gap-1.5" th:if="${resultat.options.size() > 0}">
                        <th:block th:each="option : ${resultat.options}">
                            <span class="inline-flex items-center rounded-full bg-indigo-50 px-2.5 py-0.5 text-xs font-medium text-indigo-700"
                                  th:text="${option.nomOption}"></span>
                        </th:block>
                    </div>
                </li>
            </ol>

        </section>
    </div>
</th:block>
</body>
</html>
