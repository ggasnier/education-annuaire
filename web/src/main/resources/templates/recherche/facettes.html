<th:block th:fragment="facettes">

    <h3 class="text-lg font-semibold mb-4">Filtres</h3>

    <div class="mb-6" th:each="facette : ${recherche.facettes}"
         th:if="${facette.valeurs != null and facette.valeurs.size() > 0}">
        <h4 class="font-medium mb-2" th:text="${facette.nom}"></h4>

        <div class="space-y-1">
            <label class="flex items-center justify-between w-full"
                   th:each="valeur : ${facette.valeurs}">
                <div class="flex items-center">
                    <input class="mr-2 text-blue-600"
                           th:checked="${valeur.checked}"
                           th:name="${facette.code}"
                           th:onchange="this.form.submit()"
                           th:value="${valeur.code}"
                           type="checkbox">
                    <span class="text-sm text-gray-700" th:text="${valeur.nom}"></span>
                </div>
                <span class="text-sm text-gray-400"
                      th:text="'(' + ${valeur.total} + ')'"></span>
            </label>
        </div>
    </div>

</th:block>
