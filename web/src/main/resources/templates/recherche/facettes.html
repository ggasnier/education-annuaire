<th:block th:fragment="facettes">
    <aside :class="mobileFilters ? 'block' : 'hidden lg:block'"
           class="w-full lg:w-64 lg:flex-shrink-0 lg:order-last mb-6 lg:mb-0" x-transition>
        <div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm lg:sticky lg:top-20">
            <h2 class="text-sm font-bold text-gray-700 mb-4 hidden sm:block">Affiner les résultats</h2>

            <div class="m5-6" th:each="facette : ${recherche.facettes}"
                 th:if="${facette.valeurs != null and facette.valeurs.size() > 0}"
                 x-data="{ expanded: false }">

                <div class="mb-5">
                    <h3 class="text-xs font-semibold uppercase tracking-wide text-gray-400 mb-2"
                        th:text="${facette.nom}"></h3>

                    <ul class="space-y-1.5 text-sm">
                        <li th:each="valeur, iter : ${facette.valeurs}"
                            th:attr="x-show='expanded || ' + ${iter.index} + ' < 5'"
                            x-transition:enter="transition ease-out duration-150"
                            x-transition:enter-start="opacity-0 -translate-y-1"
                            x-transition:enter-end="opacity-100 translate-y-0">
                            <label
                                    class="flex items-center gap-2 cursor-pointer hover:text-indigo-600"><input
                                    class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                                    th:checked="${valeur.checked}"
                                    th:name="${facette.code}"
                                    th:value="${valeur.code}"
                                    type="checkbox"/>
                                <th:block th:text="${valeur.nom}"></th:block>
                                <span class="ml-auto text-gray-400 text-xs"
                                      th:text="'(' + ${valeur.total} + ')'"></span>
                            </label>
                        </li>
                    </ul>

                    <button th:if="${facette.valeurs.size() > 5}"
                            @click="expanded = !expanded"
                            type="button"
                            class="mt-2 flex items-center gap-1 text-xs text-indigo-600 hover:text-indigo-800 font-medium focus:outline-none">
                        <span th:attr="x-text='expanded ? \'Voir moins\' : \'Voir ' + ${facette.valeurs.size() - 5} + ' de plus\''"></span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 transition-transform duration-200"
                             :class="expanded ? 'rotate-180' : ''"
                             viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                  d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                                  clip-rule="evenodd"/>
                        </svg>
                    </button>
                </div>

                <hr class="border-gray-100 mb-5"/>
            </div>
        </div>
    </aside>
</th:block>
