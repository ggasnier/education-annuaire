<!DOCTYPE html>
<html lang="fr"
      layout:decorate="~{layout/default}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Recherche</title>
</head>

<body>
<th:block layout:fragment="content">
    <div class="lg:hidden mb-4">
        <button @click="mobileFilters = !mobileFilters"
                class="flex items-center gap-2 rounded-full border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 4h18M7 8h10M10 12h4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span x-text="mobileFilters ? 'Masquer les filtres' : 'Filtrer les résultats'"></span>
        </button>
    </div>

    <div class="lg:flex lg:gap-4 lg:items-start">
        <div th:replace="~{recherche/facettes :: facettes}"></div>

        <section class="flex-1 min-w-0">
            <p class="text-xs text-gray-400 mb-4">Environ <span th:text="${recherche.total}"></span>
                résultats pour <span th:text="${recherche.q}"></span></p>

            <ol class="space-y-3">
                <li class="bg-white rounded-xl border border-gray-200 shadow-sm px-5 py-4 hover:border-indigo-300 transition"
                    th:each="resultat : ${recherche.resultats}">

                    <a class="text-indigo-600 text-base font-semibold hover:underline leading-snug"
                       th:href="@{/metiers/{code}(code=${resultat.code})}"
                       th:text="${resultat.nom}"></a>
                </li>
            </ol>
        </section>
    </div>
</th:block>
</body>
</html>
