<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-gray-50 text-gray-900">

<main class="max-w-7xl mx-auto">

    <div class="grid grid-cols-3 gap-4">
        <div class="" th:each="n : ${natures}">
            <h2 class="text-2xl pb-3" th:text="${n.nature.nom}">Nom nature</h2>
            <ul class="">
                <li class="" th:each="e : ${n.etablissements}">
                    <a class="" th:href="@{|/etablissements/${e.uai}|}"><span th:text="${e.nom}"></span></a>
                </li>
            </ul>
        </div><!--each-->
    </div>
</main>
</body>
</html>
