<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Recherche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-50 min-h-screen">

<form action="#" method="get">

    <!-- NAVBAR -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-4">

            <!-- Logo -->
            <a class="flex-shrink-0 flex items-center gap-2 text-indigo-600 font-bold text-xl" href="/">
                <svg class="w-9 h-9" fill="none" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
                    <rect fill="currentColor" height="36" rx="10" width="36"/>
                    <text dominant-baseline="central" fill="white" font-family="Georgia, serif" font-size="24"
                          font-weight="bold" text-anchor="middle"
                          x="18" y="18">F
                    </text>
                </svg>
                <span class="hidden sm:inline">Formakoi</span>
            </a>

            <!-- Search form -->
            <div class="flex flex-1" x-data="{
                        searchType: 'etablissement',
                        placeholders: {
                            etablissement: 'Nom d\'établissement, ville…',
                            formation: 'Intitulé de formation…',
                            certification: 'Nom de certification…',
                            diplome: 'Intitulé de diplôme…',
                            metier: 'Nom ou code ROME du métier…'
                        }
                    }">
                <div
                        class="relative flex flex-1 rounded-full border border-gray-300 bg-gray-100 focus-within:border-indigo-500 focus-within:bg-white focus-within:ring-2 focus-within:ring-indigo-200 transition overflow-hidden">
                    <select class="shrink-0 self-stretch bg-transparent border-r border-gray-300 pl-3 pr-8 sm:pr-3 text-sm text-gray-600 focus:outline-none cursor-pointer max-w-[6rem] sm:max-w-none"
                            name="type"
                            x-model="searchType">
                        <option value="etablissement">Établissement</option>
                        <option value="formation">Formation</option>
                        <option value="certification">Certification</option>
                        <option value="diplome">Diplôme</option>
                        <option value="metier">Métier</option>
                    </select>
                    <input :placeholder="placeholders[searchType]"
                           class="flex-1 min-w-0 bg-transparent py-2 pl-4 pr-12 text-sm text-gray-800 placeholder-gray-400 focus:outline-none"
                           name="q"
                           type="search"/>
                    <button aria-label="Rechercher"
                            class="absolute right-2 top-1/2 -translate-y-1/2 rounded-full bg-indigo-600 p-1.5 text-white hover:bg-indigo-700 transition"
                            type="submit">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5"
                             viewBox="0 0 24 24">
                            <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke-linecap="round"
                                  stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>

        </div>

    </header>

    <!-- CONTENU -->
    <main class="max-w-6xl mx-auto px-4 py-6" x-data="{ mobileFilters: false }">

        <h1 th:text="${metier.nom}"></h1>

        <h2>Synonymes</h2>
        <ul>
            <li th:each="appellation : ${metier.appellations}">
                <span th:text="${appellation}"></span>
            </li>
        </ul>

        <h2>Description</h2>
        <ul>
            <li th:each="definition : ${metier.definitions}">
                <span th:text="${definition}"></span>
            </li>
        </ul>

        <h2>Accès</h2>
        <ul>
            <li th:each="acces : ${metier.access}">
                <span th:text="${acces}"></span>
            </li>
        </ul>


    </main>

</form>

</body>

</html>
