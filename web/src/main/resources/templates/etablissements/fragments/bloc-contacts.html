<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <div th:fragment="bloc" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6"
        th:if="${contacts != null && contacts.size() > 0}">
        <h2 class="text-xl font-semibold text-gray-900 mb-4">Contacts</h2>

        <div class="space-y-3">
            <div>
                <dt class="text-sm font-medium text-gray-700 mb-2">Divers</dt>
                <dd class="flex flex-wrap gap-2">
                    <th:block th:each="contact : ${contacts}">
                        <span class="inline-flex items-center px-2 py-1 rounded-full text-xs bg-blue-100 text-blue-800"
                            th:text="${contact.nom}"></span>
                    </th:block>
                </dd>
            </div>
        </div>
    </div>

</body>

</html>
