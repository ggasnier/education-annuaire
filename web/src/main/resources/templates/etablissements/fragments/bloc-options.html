<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6" th:fragment="bloc"
     th:if="${options != null && options.size() > 0}">
    <h2 class="text-xl font-semibold text-gray-900 mb-4">Autres Informations</h2>

    <div class="space-y-3">
        <div th:each="o : ${options}">
            <dt class="text-sm font-medium text-gray-700 mb-2" th:text="${o.categorie.nom}"></dt>
            <dd class="flex flex-wrap gap-2">
                <th:block th:each="option : ${o.options}">
                        <span
                                th:class="${'inline-flex items-center px-3 py-1 rounded-full text-sm ' + o.categorie.couleur}">
                            <span th:text="${option.emoji}"></span>&nbsp;<span th:text="${option.nom}"></span>
                        </span>
                </th:block>
            </dd>
        </div>
    </div>
</div>
</body>
</html>
