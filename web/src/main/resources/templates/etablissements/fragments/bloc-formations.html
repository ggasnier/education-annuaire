<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 lg:col-span-2" th:fragment="bloc"
     th:if="${formations != null && formations.size() > 0}">
    <h2 class="text-xl font-semibold text-gray-900 mb-4">Formations</h2>

    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
            <tr class="border-b border-gray-200">
                <th class="text-left py-3 px-4 font-medium text-gray-900">Nom de la formation</th>
            </tr>
            </thead>
            <tbody>
            <tr class="border-b border-gray-100 hover:bg-gray-50" th:each="f : ${formations}">
                <td class="py-3 px-4" th:text="${f.nom}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
