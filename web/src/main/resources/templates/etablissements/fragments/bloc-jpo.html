<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6" th:fragment="bloc"
     th:if="${journees != null && journees.size() > 0}">
    <h2 class="text-xl font-semibold text-gray-900 mb-4 flex items-center">
        <svg class="w-6 h-6 text-blue-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                  stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
        </svg>
        Journées Portes Ouvertes
    </h2>

    <div class="space-y-2">
        <th:block th:each="jpo : ${journees}">
            <div class="flex items-center py-2 px-3 rounded-lg hover:bg-gray-50 transition-colors">
                <div class="flex-1">
                    <!-- Date(s) -->
                    <span class="font-medium text-gray-900">
                            <th:block th:if="${jpo.dateDebut.isEqual(jpo.dateFin)}">
                                <span th:text="${#temporals.format(jpo.dateDebut, 'dd/MM/yyyy')}"></span>
                            </th:block>
                            <th:block th:unless="${jpo.dateDebut.isEqual(jpo.dateFin)}">
                                Du <span th:text="${#temporals.format(jpo.dateDebut, 'dd/MM/yyyy')}"></span>
                                au <span th:text="${#temporals.format(jpo.dateFin, 'dd/MM/yyyy')}"></span>
                            </th:block>
                        </span>

                    <!-- Horaires -->
                    <span class="text-gray-600 ml-2" th:if="${jpo.heureDebut != null && jpo.heureFin != null}">
                            de <span th:text="${#temporals.format(jpo.heureDebut, 'HH:mm')}"></span>
                            à <span th:text="${#temporals.format(jpo.heureFin, 'HH:mm')}"></span>
                        </span>

                    <!-- Commentaire -->
                    <span class="text-sm text-gray-500 ml-2 italic"
                          th:if="${jpo.commentaire != null && !jpo.commentaire.isBlank()}">
                            - <span th:text="${jpo.commentaire}"></span>
                        </span>
                </div>
            </div>
        </th:block>
    </div>
</div>
</body>
</html>
