<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Résultats</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-gray-50 text-gray-900">

<div class="max-w-7xl mx-auto mt-6">
    <ul>
        <li><span>UAI:</span> <span th:text="${etablissement.uai}"></span></li>
        <li><span>SIRET:</span> <span th:text="${etablissement.siret}"></span></li>
        <li><span>Nom:</span> <span th:text="${etablissement.nom}"></span></li>
        <li><span>Adresse:</span> <span th:text="${etablissement.adresse}"></span></li>
        <li><span>Complément:</span> <span th:text="${etablissement.complement}"></span></li>
        <li><span>Code Postal:</span> <span th:text="${etablissement.codePostal}"></span></li>
        <li><span>Commune:</span> <span th:text="${etablissement.nomCommune}"></span> (<span
                th:text="${etablissement.codeCommune}"></span>)
        </li>
        <li><span>Académie:</span> <span th:text="${etablissement.nomAcademie}"></span> (<span
                th:text="${etablissement.codeAcademie}"></span>)
        </li>

        <li><span>Département:</span> <span th:text="${etablissement.nomDepartement}"></span> (<span
                th:text="${etablissement.codeDepartement}"></span>)
        </li>

        <li><span>Etat:</span> <span th:text="${etablissement.nomEtat}"></span> (<span
                th:text="${etablissement.codeEtat}"></span>)
        </li>

        <li><span>Nature:</span> <span th:text="${etablissement.nomNature}"></span> (<span
                th:text="${etablissement.codeNature}"></span>)
        </li>
        <li><span>Contrat:</span> <span th:text="${etablissement.nomContrat}"></span> (<span
                th:text="${etablissement.codeContrat}"></span>)
        </li>
    </ul>
    <div th:text="${etablissement}"></div>

    <div th:text="${options}"></div>

    <div>
        <h2>Langues</h2>

        <th:block th:each="langue : ${langues}">
            <span th:text="${langue.nom}"></span> (<span th:text="${langue.niveau}"></span>)
        </th:block>
    </div>

    <div th:text="${sectionSportives}"></div>

    <table class="border-collapse table-auto border border-gray-400">
        <tr>
            <th>Année</th>
        </tr>

        <tr th:each="indice : ${indices}">
            <td class="border border-gray-300" th:text="${indice.annee}"></td>
            <td class="border border-gray-300" th:text="${indice.valeur}"></td>
            <td class="border border-gray-300" th:text="${indice.ecartType()}"></td>
        </tr>

    </table>

    <div th:text="${indices}"></div>

</div>
</body>
</html>
