<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-50">

<header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between py-3">
            <!-- Logo -->
            <div class="flex-shrink-0">
                <a class="flex items-center" href="index.html">
                    <h1 class="text-xl font-light text-gray-700">
                        <span class="text-blue-500">Forma</span><span class="text-red-500">koi</span><span
                            class="text-green-500">?</span>
                    </h1>
                </a>
            </div>

            <!-- Barre de recherche compacte -->
            <div class="flex-1 max-w-xl mx-2 md:mx-6" x-data="{ searchType: 'etablissements' }">
                <div class="flex flex-col md:flex-row md:items-center">
                    <!-- Champ de recherche -->
                    <div
                            class="flex items-center bg-white border border-gray-300 rounded-full shadow-sm hover:shadow-md transition-shadow duration-200 focus-within:shadow-md flex-1 mb-2 md:mb-0">
                        <svg class="w-4 h-4 text-gray-400 ml-3" fill="none" stroke="currentColor"
                             viewBox="0 0 24 24">
                            <path d="m21 21-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"
                                  stroke-linejoin="round" stroke-width="2"></path>
                        </svg>
                        <input autocomplete="off"
                               class="w-full py-2 px-3 text-sm border-none rounded-full focus:outline-none"
                               placeholder="Rechercher un établissement..." type="text">
                    </div>

                    <!-- Options de recherche -->
                    <div class="flex items-center justify-center md:ml-4 space-x-3 md:space-x-4">
                        <label class="flex items-center cursor-pointer text-xs">
                            <input checked class="sr-only" name="searchType" type="radio" value="etablissements"
                                   x-model="searchType">
                            <div class="relative mr-1 md:mr-2">
                                <div class="w-3 h-3 border border-gray-400 rounded-full"></div>
                                <div :class="{'scale-50': searchType === 'etablissements'}"
                                     class="absolute inset-0 w-3 h-3 bg-search-blue rounded-full scale-0 transition-transform">
                                </div>
                            </div>
                            <span class="text-gray-600">Établissements</span>
                        </label>
                        <label class="flex items-center cursor-pointer text-xs">
                            <input class="sr-only" name="searchType" type="radio" value="formations"
                                   x-model="searchType">
                            <div class="relative mr-1 md:mr-2">
                                <div class="w-3 h-3 border border-gray-400 rounded-full"></div>
                                <div :class="{'scale-50': searchType === 'formations'}"
                                     class="absolute inset-0 w-3 h-3 bg-search-blue rounded-full scale-0 transition-transform">
                                </div>
                            </div>
                            <span class="text-gray-600">Formations</span>
                        </label>
                    </div>
                </div>
            </div>

            <!--            <div class="flex items-center space-x-4 flex-shrink-0">-->
            <!--                <a class="text-sm text-gray-600 hover:text-gray-800 transition-colors" href="./recherche">-->
            <!--                    ← Retour aux résultats-->
            <!--                </a>-->
            <!--            </div>-->
        </div>
    </div>
</header>

<!--debut des blocs-->
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
        <div class="flex flex-col md:flex-row md:items-start md:justify-between">
            <div class="flex-1">
                <div class="flex items-center gap-3 mb-3">
                    <h1 class="text-3xl font-bold text-gray-900" th:text="${etablissement.nom}"></h1>

                    <span
                            class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800"
                            th:if="${etablissement.actif}">
                            Ouvert
                        </span>

                    <span
                            class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 text-red-800"
                            th:unless="${etablissement.actif}">
                            Fermé
                        </span>
                </div>
                <!--                <div class="flex items-center text-gray-500 mb-4">-->
                <!--                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">-->
                <!--                        <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"-->
                <!--                              stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>-->
                <!--                        <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"-->
                <!--                              stroke-width="2"></path>-->
                <!--                    </svg>-->
                <!--                    &lt;!&ndash;                    <span th:text="${etablissement.adresse}"></span>&nbsp;<span&ndash;&gt;-->
                <!--                    &lt;!&ndash;                        th:text="${etablissement.codePostal}"></span>&nbsp;<span&ndash;&gt;-->
                <!--                    &lt;!&ndash;                        th:text="${etablissement.nomCommune}"></span>&ndash;&gt;-->
                <!--                </div>-->
            </div>

        </div>
    </div>

    <!-- Grille automatique pour les blocs -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div th:replace="~{etablissements/fragments/bloc-infos-principales :: bloc}"></div>
        <div th:replace="~{etablissements/fragments/bloc-options :: bloc}"></div>
        <div th:replace="~{etablissements/fragments/bloc-contacts :: bloc}"></div>
        <div th:replace="~{etablissements/fragments/bloc-langues :: bloc}"></div>
        <div th:replace="~{etablissements/fragments/bloc-sports :: bloc}"></div>
        <div th:replace="~{etablissements/fragments/bloc-specialites :: bloc}"></div>
        <div th:replace="~{etablissements/fragments/bloc-jpo :: bloc}"></div>
        <div th:replace="~{etablissements/fragments/bloc-ips :: bloc}"></div>
        <div th:replace="~{etablissements/fragments/bloc-formations :: bloc}"></div>
    </div>
</div><!--fin des blocs-->
</body>

</html>
