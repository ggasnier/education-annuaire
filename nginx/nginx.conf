events {}

http {
    server {
        listen 80;
        server_name annuaire.guillaumegasnier.com;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Redirection HTTP -> HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name annuaire.guillaumegasnier.com;

        ssl_certificate /etc/letsencrypt/live/annuaire.guillaumegasnier.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/annuaire.guillaumegasnier.com/privkey.pem;

        location / {
            proxy_pass http://web:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
