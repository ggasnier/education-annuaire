name: Build & Deploy

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push images
        run: |
          docker build -t ghcr.io/${{ github.repository }}/web:latest ./web
          docker push ghcr.io/${{ github.repository }}/web:latest
          docker build -t ghcr.io/${{ github.repository }}/shell:latest ./shell
          docker push ghcr.io/${{ github.repository }}/shell:latest

