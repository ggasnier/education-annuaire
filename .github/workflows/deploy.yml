name: Build & Deploy

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build & Push images
        run: |
          docker build --target web -t ghcr.io/${{ env.REPO }}/web:latest .
          docker push ghcr.io/${{ env.REPO }}/web:latest
          docker build --target shell -t ghcr.io/${{ env.REPO }}/shell:latest .
          docker push ghcr.io/${{ env.REPO }}/shell:latest

