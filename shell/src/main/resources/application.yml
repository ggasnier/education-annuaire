spring:
  application:
    name: education-annuaire
  shell:
    interactive:
      enabled: true
  profiles:
    active: local
  main:
    web-application-type: none
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enable: true
    baseline-on-migrate: true
    validate-on-migrate: true